# repo-context MCP server + pgvector DB.
# Production embeddings target is nomic-embed-code via TEI (GPU); this compose
# runs against host Ollama (nomic-embed-text, 768-dim) so it works without a GPU.
#
# Single repo (default): one repo at /workspace, selected by REPO_ID/PROJECT_ROOT.
#   INDEX_REPO=/path/to/project docker compose up --build
#
# Multiple repos (one shared server): supply a config with a `repos` array and
# mount each repo where its projectRoot points (see config.multi-repo.example.json,
# which uses /repos/<name>). Clients then pick a repo per request via the
# `X-Repo-Id` header — no separate server/port per repo.
#   REPO_CONFIG=./config.multi-repo.example.json REPOS_DIR=/abs/parent/of/repos \
#     docker compose up --build
# The mounted config is read live, so editing `repos` needs no image rebuild.
services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: repo_context
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d repo_context"]
      interval: 3s
      timeout: 3s
      retries: 30
    ports:
      - "5433:5432"   # exposed for debugging only

  mcp:
    build: .
    ports:
      - "3333:3000"   # Claude Code connects to http://localhost:3333/mcp
    environment:
      PORT: "3000"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/repo_context"
      REPO_ID: "repo-context"
      PROJECT_ROOT: "/workspace"
    volumes:
      # Bind-mount the repo to index (read-write so .repo-context/ + wiki can be written)
      - ${INDEX_REPO:-.}:/workspace
      # Config is mounted (not just baked at build) so `repos` can be edited live.
      - ${REPO_CONFIG:-./config.docker.json}:/app/config.json
      # Multi-repo: uncomment and point at the parent dir holding each repo named
      # in `repos` (the example config expects them under /repos/<name>).
      # - ${REPOS_DIR:-./repos}:/repos
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach host Ollama
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
