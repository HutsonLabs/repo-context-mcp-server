# repo-context MCP server + pgvector DB.
# Production embeddings target is nomic-embed-code via TEI (GPU); this compose
# runs against host Ollama (nomic-embed-text, 768-dim) so it works without a GPU.
services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: repo_context
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d repo_context"]
      interval: 3s
      timeout: 3s
      retries: 30
    ports:
      - "5433:5432"   # exposed for debugging only

  mcp:
    build: .
    ports:
      - "3333:3000"   # Claude Code connects to http://localhost:3333/mcp
    environment:
      PORT: "3000"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/repo_context"
      REPO_ID: "repo-context"
      PROJECT_ROOT: "/workspace"
    volumes:
      # Bind-mount the repo to index (read-write so .repo-context/ + wiki can be written)
      - ${INDEX_REPO:-.}:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach host Ollama
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
